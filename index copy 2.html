<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6C5CE7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyHub">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon.svg">
<title>StudyHub - Class 8 Study Portal</title>
<style>
/* ===== CSS RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#6C5CE7;--primary-light:#a29bfe;--primary-dark:#5a4bd1;
  --accent:#00cec9;--accent2:#fd79a8;
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#25253d;--bg4:#2d2d4a;
  --text:#e0e0f0;--text2:#a0a0c0;--text3:#707090;
  --success:#00b894;--warning:#fdcb6e;--danger:#e17055;
  --radius:12px;--shadow:0 8px 32px rgba(0,0,0,0.3);
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth;height:-webkit-fill-available}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;min-height:100dvh;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid rgba(108,92,231,0.3);padding:16px 24px;padding-top:max(16px,env(safe-area-inset-top));padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:12px;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo svg{width:36px;height:36px}
.header-actions{display:flex;gap:12px;align-items:center}
.header-actions button{background:var(--bg3);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.85rem;transition:var(--transition);display:flex;align-items:center;gap:6px}
.header-actions button:hover{background:var(--primary);border-color:var(--primary)}
.header-actions button.active{background:var(--primary);border-color:var(--primary)}

/* ===== BREADCRUMB ===== */
.breadcrumb{padding:12px 24px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;font-size:0.85rem;flex-wrap:wrap}
.breadcrumb span{color:var(--text3);cursor:pointer;transition:var(--transition)}
.breadcrumb span:hover{color:var(--primary-light)}
.breadcrumb span.active{color:var(--accent);cursor:default}
.breadcrumb .sep{color:var(--text3);font-size:0.7rem}

/* ===== LAYOUT ===== */
.app-container{display:flex;min-height:calc(100vh - 110px);min-height:calc(100dvh - 110px)}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid rgba(255,255,255,0.05);padding:16px;overflow-y:auto;flex-shrink:0;transition:var(--transition);-webkit-overflow-scrolling:touch}
.main-content{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 110px);max-height:calc(100dvh - 110px);-webkit-overflow-scrolling:touch}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:140}
.sidebar-backdrop.show{display:block}

/* ===== SIDEBAR ITEMS ===== */
.sidebar-section{margin-bottom:20px}
.sidebar-section h3{color:var(--text2);font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-left:8px}
.nav-item{padding:10px 14px;border-radius:8px;cursor:pointer;transition:var(--transition);margin-bottom:4px;font-size:0.9rem;display:flex;align-items:center;gap:10px;position:relative}
.nav-item:hover{background:rgba(108,92,231,0.15);color:var(--primary-light)}
.nav-item.active{background:linear-gradient(135deg,rgba(108,92,231,0.25),rgba(0,206,201,0.15));color:var(--accent);border-left:3px solid var(--accent)}
.nav-item .icon{font-size:1.1rem;width:24px;text-align:center}
.nav-item .badge{position:absolute;right:10px;background:var(--primary);color:#fff;font-size:0.65rem;padding:2px 7px;border-radius:10px}
.nav-sub{margin-left:28px;border-left:2px solid var(--bg4);padding-left:12px}
.nav-sub .nav-item{font-size:0.85rem;padding:7px 12px}

/* ===== CARDS ===== */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:24px}
.card{background:linear-gradient(145deg,var(--bg3),var(--bg2));border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:24px;transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:var(--transition)}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(108,92,231,0.3)}
.card:hover::before{opacity:1}
.card-icon{font-size:2.5rem;margin-bottom:12px}
.card h3{font-size:1.1rem;margin-bottom:8px;color:var(--text)}
.card p{font-size:0.85rem;color:var(--text2);line-height:1.5}
.card .card-meta{display:flex;gap:12px;margin-top:14px;font-size:0.75rem;color:var(--text3)}
.card .card-meta span{display:flex;align-items:center;gap:4px}

/* ===== CONTENT SECTIONS ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-header h1{font-size:1.8rem;background:linear-gradient(135deg,var(--text),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section-header h2{font-size:1.4rem;color:var(--text)}

/* ===== NOTES VIEW ===== */
.note-block{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:var(--transition);position:relative}
.note-block:hover{border-color:rgba(108,92,231,0.3)}
.note-block h3{color:var(--primary-light);margin-bottom:8px;font-size:1.05rem}
.note-block p{color:var(--text2);font-size:0.92rem;line-height:1.7}
.note-block .note-number{position:absolute;top:12px;right:16px;background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700}
.tip-box{background:rgba(0,206,201,0.08);border:1px solid rgba(0,206,201,0.2);border-radius:8px;padding:12px 16px;margin-top:10px;font-size:0.83rem;color:var(--accent)}
.tip-box.exam{background:rgba(253,121,168,0.08);border-color:rgba(253,121,168,0.2);color:var(--accent2)}
.tip-box strong{display:block;margin-bottom:4px}

/* ===== QUESTIONS VIEW ===== */
.question-type-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.q-tab{padding:8px 18px;border-radius:20px;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);cursor:pointer;font-size:0.85rem;color:var(--text2);transition:var(--transition)}
.q-tab:hover,.q-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.question-card{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:var(--transition)}
.question-card:hover{border-color:rgba(108,92,231,0.3)}
.question-card .q-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--primary-light);margin-bottom:8px;font-weight:600}
.question-card .q-text{font-size:0.95rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.question-card .q-options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.question-card .q-option{padding:10px 16px;border-radius:8px;background:var(--bg4);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:var(--transition);font-size:0.9rem;display:flex;align-items:center;gap:10px}
.question-card .q-option:hover{border-color:var(--primary)}
.question-card .q-option.selected{border-color:var(--primary);background:rgba(108,92,231,0.15)}
.question-card .q-option.correct{border-color:var(--success);background:rgba(0,184,148,0.15);color:var(--success)}
.question-card .q-option.wrong{border-color:var(--danger);background:rgba(225,112,85,0.15);color:var(--danger)}
.question-card .q-option .opt-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.answer-reveal{background:rgba(0,184,148,0.08);border:1px solid rgba(0,184,148,0.2);border-radius:8px;padding:14px 18px;margin-top:10px;font-size:0.88rem;color:var(--success);display:none}
.answer-reveal.show{display:block}
.answer-reveal p{margin-bottom:6px}
.btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;transition:var(--transition);font-weight:600}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-accent{background:var(--accent);color:var(--bg)}
.btn-outline{background:transparent;border:1px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:0.8rem}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ===== MATCH COLUMNS ===== */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.match-col h4{text-align:center;color:var(--text2);margin-bottom:10px;font-size:0.85rem}
.match-item{padding:10px 14px;background:var(--bg4);border:1px solid rgba(255,255,255,0.06);border-radius:8px;margin-bottom:6px;font-size:0.88rem;cursor:pointer;transition:var(--transition)}
.match-item:hover{border-color:var(--primary)}
.match-item.selected{border-color:var(--accent);background:rgba(0,206,201,0.1)}
.match-item.matched{border-color:var(--success);background:rgba(0,184,148,0.1);color:var(--success)}

/* ===== FILL IN BLANKS ===== */
.blank-input{background:var(--bg4);border:1px solid rgba(255,255,255,0.1);border-bottom:2px dashed var(--primary);color:var(--text);padding:4px 12px;border-radius:4px;font-size:0.9rem;width:140px;outline:none;transition:var(--transition)}
.blank-input:focus{border-bottom-color:var(--accent)}
.blank-input.correct{border-bottom-color:var(--success);color:var(--success)}
.blank-input.wrong{border-bottom-color:var(--danger);color:var(--danger)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;padding:32px;position:relative}
.modal h2{margin-bottom:20px;color:var(--text)}
.modal .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer;transition:var(--transition)}
.modal .close-btn:hover{color:var(--danger)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:0.85rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:10px 14px;border-radius:8px;font-size:0.9rem;outline:none;transition:var(--transition);font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{min-height:100px;resize:vertical}
.form-group select{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ===== PROGRESS BAR ===== */
.progress-bar{background:var(--bg4);height:6px;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 0.5s ease}

/* ===== SEARCH ===== */
.search-box{position:relative}
.search-box input{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:10px 14px 10px 38px;border-radius:8px;font-size:0.9rem;outline:none}
.search-box input:focus{border-color:var(--primary)}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}

/* ===== STATS ROW ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:18px;text-align:center}
.stat-card .stat-num{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .stat-label{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* ===== TOGGLE ===== */
.toggle-answer{color:var(--primary-light);cursor:pointer;font-size:0.85rem;margin-top:8px;display:inline-flex;align-items:center;gap:4px;transition:var(--transition)}
.toggle-answer:hover{color:var(--accent)}

/* ===== RESPONSIVE (iPad, phone, touch) ===== */
@media(max-width:1024px){
  .header-actions{flex-wrap:wrap;justify-content:flex-end;max-width:55%}
  .header-actions button{min-height:44px;min-width:44px;padding:10px 12px;font-size:0.8rem}
  .nav-item,.card,.q-option,.tf-btn,.content-tab,.q-tab{min-height:44px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}
@media(max-width:768px){
  .sidebar{display:none;position:fixed;left:0;top:0;bottom:0;z-index:150;width:min(280px,85vw);padding-bottom:env(safe-area-inset-bottom)}
  .sidebar.show{display:block}
  .card-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .match-grid{grid-template-columns:1fr}
  .header{padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top))}
  .header-actions{max-width:100%}
  .main-content{padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
  .mobile-menu-btn{display:flex !important;min-width:44px;min-height:44px;align-items:center;justify-content:center}
  .logo{font-size:1.2rem}
}
.mobile-menu-btn{display:none !important}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pulse{animation:pulse 0.3s ease}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:4rem;margin-bottom:16px;opacity:0.5}
.empty-state h3{color:var(--text2);margin-bottom:8px}

/* ===== TAG ===== */
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:600;margin-right:4px}
.tag-physics{background:rgba(108,92,231,0.2);color:var(--primary-light)}
.tag-chemistry{background:rgba(0,206,201,0.2);color:var(--accent)}
.tag-biology{background:rgba(0,184,148,0.2);color:var(--success)}
.tag-maths{background:rgba(253,203,110,0.2);color:var(--warning)}

/* ===== TRUE/FALSE SPECIFIC ===== */
.tf-options{display:flex;gap:10px;margin:10px 0}
.tf-btn{padding:8px 24px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:var(--bg4);color:var(--text2);cursor:pointer;transition:var(--transition);font-weight:600}
.tf-btn:hover{border-color:var(--primary)}
.tf-btn.selected-true{background:rgba(0,184,148,0.2);border-color:var(--success);color:var(--success)}
.tf-btn.selected-false{background:rgba(225,112,85,0.2);border-color:var(--danger);color:var(--danger)}

/* ===== TAB BAR (Notes/Questions) ===== */
.content-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg3);border-radius:var(--radius);padding:4px;border:1px solid rgba(255,255,255,0.06)}
.content-tab{flex:1;padding:10px 20px;text-align:center;border-radius:10px;cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--text2);transition:var(--transition)}
.content-tab:hover{color:var(--text)}
.content-tab.active{background:var(--primary);color:#fff}

/* ===== TOAST NOTIFICATION ===== */
.toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);color:var(--text);border:1px solid rgba(255,255,255,0.12);padding:14px 28px;border-radius:12px;font-size:0.9rem;font-weight:600;z-index:999;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.45);opacity:0;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);pointer-events:none;max-width:90vw}
.toast.toast-success{border-color:rgba(0,184,148,0.4);background:linear-gradient(135deg,var(--bg3),rgba(0,184,148,0.1))}
.toast.toast-error{border-color:rgba(225,112,85,0.4);background:linear-gradient(135deg,var(--bg3),rgba(225,112,85,0.1))}
.toast.toast-info{border-color:rgba(108,92,231,0.4);background:linear-gradient(135deg,var(--bg3),rgba(108,92,231,0.1))}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}

/* ===== IMPORT PREVIEW ===== */
.import-preview{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0}
.import-col{background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px}
.import-col h4{margin-bottom:10px;font-size:0.85rem;display:flex;align-items:center;gap:6px}
.import-col .ip-row{display:flex;justify-content:space-between;padding:5px 0;font-size:0.83rem;color:var(--text2);border-bottom:1px solid rgba(255,255,255,0.04)}
.import-col .ip-row:last-child{border-bottom:none}
.import-col .ip-row span:last-child{font-weight:700;color:var(--text)}
.import-strategy{display:flex;flex-direction:column;gap:10px;margin:16px 0}
.import-strategy label{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg3);border:1px solid rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;transition:var(--transition);font-size:0.9rem}
.import-strategy label:hover{border-color:var(--primary)}
.import-strategy input[type="radio"]{accent-color:var(--primary);width:18px;height:18px}
.import-strategy .strat-desc{font-size:0.78rem;color:var(--text3);margin-top:2px}
@media(max-width:768px){.import-preview{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="mobile-menu-btn" onclick="toggleSidebar()" style="background:var(--bg3);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:8px;border-radius:8px;cursor:pointer">☰</button>
    <div class="logo">
      <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="url(#g1)"/><path d="M10 26V12l8-4 8 4v14l-8 4-8-4z" fill="none" stroke="#fff" stroke-width="2"/><path d="M18 12v14M10 12l8 4 8-4" fill="none" stroke="#fff" stroke-width="2"/><defs><linearGradient id="g1" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#6C5CE7"/><stop offset="1" stop-color="#00cec9"/></linearGradient></defs></svg>
      StudyHub
    </div>
  </div>
  <div class="header-actions">
    <button onclick="exportData()" id="btn-export" title="Download backup">📥 Export</button>
    <button onclick="document.getElementById('import-file').click()" id="btn-import" title="Restore from backup">📤 Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button onclick="openContentManager()" id="btn-manage">✏️ Manage</button>
    <button onclick="openAddContent()" id="btn-add">➕ Add New</button>
  </div>
</header>

<!-- BREADCRUMB -->
<nav class="breadcrumb" id="breadcrumb">
  <span onclick="navigateTo('home')">🏠 Home</span>
</nav>

<!-- APP -->
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()" aria-hidden="true"></div>
<div class="app-container">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="search-box" style="margin-bottom:16px">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search topics..." oninput="searchTopics(this.value)">
    </div>

    <div class="sidebar-section">
      <h3>📚 Class</h3>
      <div id="class-nav"></div>

  ],
  content: [
    // ===== NOTES for Chapter 1: Matter =====
    {id:"n1",topicId:"ch1-matter",type:"note",subtopic:"What is Matter?",
     content:'Matter is something which has mass, occupies space and can be perceived by our senses. e.g. Hydrogen, milk, oxygen, pen, table, water, iron, air, oil, sugar etc.',
     explanation:'Matter is anything that you can touch, taste, or smell in the physical world. Since it has mass, it means it weighs something and takes up a certain amount of room.',
     teacherTip:'Use the acronym "MOS" - Mass, Occupies space, Senses - to remember what matter is.',
     examTip:'When giving examples of matter, try to include one solid, one liquid, and one gas to show complete understanding.'},
    {id:"n2",topicId:"ch1-matter",type:"note",subtopic:"Molecules - Building Blocks of Matter",
     content:'Matter is composed of tiny particles called molecules, which are in constant motion, have spaces between them and have inter-molecular attraction.',
     explanation:'Even though matter looks solid or continuous, it is actually made of billions of tiny pieces. These pieces never stay still and are always pulling on each other.',
     teacherTip:'Imagine molecules like a crowd of people constantly moving and jostling in a room.',
     examTip:'Always mention "constant motion" when describing the molecular nature of matter.'},
    {id:"n3",topicId:"ch1-matter",type:"note",subtopic:"Molecules Exist Freely",
     content:'Every molecule can exist freely in nature and has all the properties of matter.',
     explanation:'A single molecule of water still behaves exactly like water and has the same chemical traits. It is the smallest part of a substance that can stay on its own.',
     teacherTip:'Think of a molecule as the smallest "representative" of a substance.',
     examTip:'Use the word "freely" specifically when defining a molecule.'},
    {id:"n4",topicId:"ch1-matter",type:"note",subtopic:"Atoms vs Molecules",
     content:'A molecule is composed of ATOMS, but atom cannot exist free in nature.',
     explanation:'Atoms are like the individual LEGO bricks that snap together to build a molecule. While the molecule is stable alone, the individual atoms are usually too reactive to stay separate.',
     teacherTip:'Atoms are the "building blocks," and molecules are the "buildings."',
     examTip:'Remember that the main difference between an atom and a molecule in this context is the ability to exist independently.'},
    {id:"n5",topicId:"ch1-matter",type:"note",subtopic:"Inter-Molecular Force",
     content:'The molecules of a matter exert a force of attraction on each other. The force of attraction is called INTER-MOLECULAR FORCE. This force in solid is very strong. In liquids this force is less strong and in molecules of gas it is very less.',
     explanation:'This is the invisible "glue" that holds matter together and determines if it is a solid, liquid, or gas. The stronger this force, the closer the molecules stay to one another.',
     teacherTip:'Think of "Inter" as "between," so this is the force "between molecules." Solid = Strong, Liquid = Loose, Gas = Ghostly weak.',
     examTip:'Don\'t confuse this with intra-molecular forces; focus on the attraction between separate molecules.'},
    {id:"n6",topicId:"ch1-matter",type:"note",subtopic:"Force of Cohesion",
     content:'The inter-molecular force of attraction between the molecules of SAME substance is called FORCE OF COHESION. e.g. between water and water.',
     explanation:'Cohesion is what allows water to form droplets because the water molecules want to stick to their own kind.',
     teacherTip:'"Co" means together with its own kind - like "co-workers" of the same company.',
     examTip:'Mention "same substance" to get full marks for the definition of cohesion.'},
    {id:"n7",topicId:"ch1-matter",type:"note",subtopic:"Force of Adhesion",
     content:'The force of attraction between the molecules of two DIFFERENT substances is called FORCE OF ADHESION. e.g. between glue and paper.',
     explanation:'Adhesion is why water sticks to a glass or why paint sticks to a wall. It involves the attraction between two completely different types of molecules.',
     teacherTip:'Think of "Adhesive tape" which is designed to stick to different things.',
     examTip:'Use the example of "glue and paper" to illustrate adhesion clearly in your answer.'},
    {id:"n8",topicId:"ch1-matter",type:"note",subtopic:"Experiment: Spaces Between Molecules",
     content:'Take 50 c.c. of water in a measuring cylinder. Add a small quantity of salt in it. Salt gets dissolved in water and still level remains at 50 c.c. The salt molecules enter into spaces of water and water molecules into spaces of salt molecules.',
     explanation:'This experiment proves that matter is not "solid" all the way through but has tiny gaps. Because the salt fits into the gaps of the water, the total volume doesn\'t increase.',
     teacherTip:'Think of this like pouring sand into a jar full of large marbles; the sand fills the gaps.',
     examTip:'When describing this experiment, emphasize that the water level "remains the same."'},
    {id:"n9",topicId:"ch1-matter",type:"note",subtopic:"Molecular Motion - Diffusion",
     content:'The molecules of matter are in constant motion. Opening a bottle of perfume in a corner of room - its smell reaches the other parts of the room. This natural spreading is called diffusion.',
     explanation:'Perfume molecules move through the air by bumping into air molecules and spreading out.',
     teacherTip:'Smelling food from the kitchen in your bedroom is the perfect real-life example of molecular motion.',
     examTip:'This example is often used to prove that molecules in gases move very fast and freely.'},
    {id:"n10",topicId:"ch1-matter",type:"note",subtopic:"Sublimation",
     content:'Change of solid directly into vapours on absorbing heat is called SUBLIMATION. Examples: camphor, naphthalene balls, dry ice.',
     explanation:'Some substances skip the liquid phase entirely when they get hot enough.',
     teacherTip:'Sublimation is like taking a "shortcut" from solid to gas.',
     examTip:'Always mention that it happens "directly" without turning into a liquid first.'},
    {id:"n11",topicId:"ch1-matter",type:"note",subtopic:"Deposition",
     content:'The change of vapours directly into solid on cooling is called DEPOSITION. Also known as desublimation.',
     explanation:'Deposition is the exact opposite of sublimation, where a gas turns into a solid instantly when it hits a cold surface. This is how frost forms on windows during a very cold night.',
     teacherTip:'Think of "depositing" or "leaving behind" a solid layer from the air.',
     examTip:'Deposition is also known as "desublimation" — know both terms.'},
    {id:"n12",topicId:"ch1-matter",type:"note",subtopic:"Melting & Freezing",
     content:'MELTING: Change of solid to liquid at fixed temperature on heating. FUSION/FREEZING: Change of liquid to solid state on cooling at a fixed temperature. Freezing is the reverse of melting.',
     explanation:'When you heat a solid, the molecules start vibrating so fast that they break free. Freezing involves removing heat so molecules slow down and get trapped again.',
     teacherTip:'For water, the melting point and freezing point are the same (0°C).',
     examTip:'Use the term "fixed temperature" to describe the melting point accurately.'},
    {id:"n13",topicId:"ch1-matter",type:"note",subtopic:"Evaporation",
     content:'EVAPORATION: Change of liquid to vapours from the surface of liquid. It is a surface phenomenon. Takes place at ALL temperatures. Has a cooling effect.',
     explanation:'Molecules at the top of a liquid escape into the air, even if the liquid isn\'t boiling. Because the hottest molecules escape first, the liquid left behind feels colder.',
     teacherTip:'Sweating is our body\'s way of using the "cooling effect" of evaporation.',
     examTip:'Distinguish evaporation from boiling by noting it happens at "all temperatures."'},
    {id:"n14",topicId:"ch1-matter",type:"note",subtopic:"Vaporization & Boiling Point",
     content:'VAPORIZATION: Change of liquid to vapour state on heating at constant temperature. BOILING POINT: The temperature at which a liquid starts changing into vapours at constant temperature. Boiling point of water is 100°C.',
     explanation:'Vaporization (or boiling) happens throughout the entire liquid once it reaches a specific temperature. It is rapid compared to evaporation.',
     teacherTip:'Think of boiling water in a kettle as "forced" vaporization using a stove.',
     examTip:'Specify that vaporization occurs at a "constant temperature" called the boiling point.'},
    {id:"n15",topicId:"ch1-matter",type:"note",subtopic:"Condensation",
     content:'CONDENSATION: The change of vapours on cooling at fixed temperature to liquid. Example: Steam at 100°C condenses to water at 100°C on cooling.',
     explanation:'Condensation is what creates the "sweat" on a cold soda can as water vapour in the air cools down.',
     teacherTip:'"Condensation" is "gas to liquid."',
     examTip:'Mention "cooling" for condensation and "heating" for sublimation.'},
    {id:"n16",topicId:"ch1-matter",type:"note",subtopic:"Change of State - Complete Cycle",
     content:'SOLID → (Melting/Heat absorbed) → LIQUID → (Vaporization/Heat absorbed) → GAS. GAS → (Condensation/Heat rejected) → LIQUID → (Freezing/Heat rejected) → SOLID. SOLID → (Sublimation) → GAS. GAS → (Deposition) → SOLID.',
     explanation:'Matter can change its physical form just by gaining or losing heat energy. The temperature stays the same during actual changes because the energy is busy rearranging molecules.',
     teacherTip:'Absorption of heat makes things "looser" (solid to gas), while rejection makes them "tighter" (gas to solid).',
     examTip:'Practice drawing the cycle with arrows to visualize how heat moving in or out drives the change.'},
    {id:"n17",topicId:"ch1-matter",type:"note",subtopic:"Factors Affecting Evaporation",
     content:'Three factors affecting rate of evaporation: (i) Area of exposed surface (ii) Temperature of liquid (iii) Nature of the liquid (iv) Presence of humidity.',
     explanation:'Evaporation goes faster if you spread the liquid out, heat it up, or if the air around it is dry. Some liquids like alcohol evaporate much faster than water.',
     teacherTip:'Think of "Hot, Dry, and Wide" for fast evaporation.',
     examTip:'Mentioning "Area of exposed surface" is a very common point in scoring full marks.'},

    // ===== TRUE/FALSE QUESTIONS =====
    {id:"tf1",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"The temperature of a substance remains unaffected during its change of state.",
     correctAnswer:"true",answer:"True. All the heat energy being added is used to break bonds between molecules rather than raising the temperature.",
     teacherTip:'During a phase change, the thermometer "takes a break" and stays still.',examTip:'This "hidden heat" is called Latent Heat.'},
    {id:"tf2",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Ice melts at 100°C.",
     correctAnswer:"false",answer:"False. Ice melts at 0°C by absorption of heat. 100°C is where liquid water turns into steam.",
     teacherTip:'0 is for ice, 100 is for steam.',examTip:'Always double-check your specific temperatures for water.'},
    {id:"tf3",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Water at 100°C has more heat than steam at 100°C.",
     correctAnswer:"false",answer:"False. Steam contains extra energy (latent heat) that was used to turn liquid into gas. Steam burns are more severe than hot water burns.",
     teacherTip:'Steam is water "plus" the extra energy it needed to escape the liquid.',examTip:'Steam at 100°C always has MORE heat energy than water at the same temperature.'},
    {id:"tf4",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Evaporation of a liquid causes cooling.",
     correctAnswer:"true",answer:"True. As fast-moving (hot) molecules leave the surface, the average energy of the remaining liquid drops.",
     teacherTip:'This is why you feel a chill when you step out of a swimming pool.',examTip:'Explain that heat is "absorbed" from the surroundings.'},
    {id:"tf5",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Water evaporates only at 100°C.",
     correctAnswer:"false",answer:"False. Evaporation happens at all temperatures. Boiling specifically requires 100°C.",
     teacherTip:'Puddles dry up after rain even if the sun isn\'t boiling the water!',examTip:'Use "at all temperatures" to describe evaporation.'},
    {id:"tf6",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Boiling takes place at all temperatures.",
     correctAnswer:"false",answer:"False. Boiling only happens at the specific boiling point temperature.",
     teacherTip:'Boiling is a "picky" process that waits for the exact right temperature.',examTip:'Contrast boiling with evaporation.'},
    {id:"tf7",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"Evaporation takes place over the entire mass of the liquid.",
     correctAnswer:"false",answer:"False. Evaporation is a surface phenomenon — only molecules at the very top escape. Boiling occurs throughout the entire bulk.",
     teacherTip:'Evaporation is like a "top-down" exit.',examTip:'Use the term "surface phenomenon" for evaporation.'},
    {id:"tf8",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"The process of a gas converting directly into solid is called vaporization.",
     correctAnswer:"false",answer:"False. Gas converting directly into solid is called deposition. Vaporization is liquid to gas.",
     teacherTip:'Vaporization creates "vapour" (gas); Deposition "deposits" a solid.',examTip:'Learn the cycle of change of state carefully.'},
    {id:"tf9",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"At high altitudes water boils above 100°C.",
     correctAnswer:"false",answer:"False. At high altitudes, air pressure is lower, so water boils at a LOWER temperature.",
     teacherTip:'Less air "pushing down" on the water means it can boil with less heat.',examTip:'Higher altitude = Lower boiling point.'},
    {id:"tf10",topicId:"ch1-matter",type:"true_false",subtopic:"Objective Questions",
     question:"The melting point of ice is 0°C.",
     correctAnswer:"true",answer:"True. This is the standard temperature where solid water begins to turn into liquid water.",
     teacherTip:'This is the same temperature as the freezing point of water.',examTip:'Use 0°C as your reference point for water phase questions.'},

    // ===== MCQ =====
    {id:"mcq1",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"The inter-molecular force is maximum in:",
     options:["solids","gases","liquids","none of the above"],correctOption:0,
     answer:"Solids have the strongest forces, which is why they don't change shape.",
     teacherTip:'If the force wasn\'t maximum, the solid would melt or flow away!',examTip:'Solids are the only state with a truly "maximum" attractive force.'},
    {id:"mcq2",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"The inter-molecular space is maximum in:",
     options:["liquids","solids","gases","none of the above"],correctOption:2,
     answer:"In gases, molecules are very far apart, occupying only a tiny fraction of the total volume.",
     teacherTip:'Think of how much space there is in air compared to a block of wood.',examTip:'Space and Force are always inverse.'},
    {id:"mcq3",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"The molecules can move freely anywhere in:",
     options:["gases","liquids","solids","none of the above"],correctOption:0,
     answer:"Gas molecules are not bound by strong forces, so they can travel freely in straight lines.",
     teacherTip:'Molecules in gases are like free-roaming birds.',examTip:'Focus on the word "anywhere."'},
    {id:"mcq4",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"The molecules move only within the boundary of:",
     options:["liquids","gases","solids","none of the above"],correctOption:0,
     answer:"Liquid molecules can slide around but can\'t fly away like gas molecules. They stay within the liquid\'s boundary.",
     teacherTip:'Liquid molecules are like people dancing in a ballroom.',examTip:'Use "boundary" as a clue for liquids.'},
    {id:"mcq5",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"The temperature at which a liquid gets converted into its vapour state is called its:",
     options:["melting point","boiling point","dewpoint","freezing point"],correctOption:1,
     answer:"The boiling point is where a liquid rapidly turns into gas throughout its entire volume. For water, this is 100°C at sea level.",
     teacherTip:'Boiling is the "loud" version of vaporization.',examTip:'"Liquid to Vapour" at a fixed temperature → boiling point.'},
    {id:"mcq6",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"Rapid conversion of water into steam is an example of:",
     options:["evaporation","freezing","melting","vaporization"],correctOption:3,
     answer:"Rapid conversion specifically describes vaporization. Unlike evaporation which is slow, vaporization is fast and energetic.",
     teacherTip:'Steam is the result of adding lots of heat quickly.',examTip:'The word "Rapid" is your biggest clue.'},
    {id:"mcq7",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"Evaporation takes place from the:",
     options:["surface of liquid","throughout the liquid","mid-portion of the liquid","bottom of liquid"],correctOption:0,
     answer:"Only molecules at the top have the chance to escape into the air.",
     teacherTip:'Evaporation is a "top-layer" job.',examTip:'Always associate "surface" with "evaporation."'},
    {id:"mcq8",topicId:"ch1-matter",type:"mcq",subtopic:"Objective Questions",
     question:"Boiling takes place from the:",
     options:["the surface of the liquid","throughout the liquid","mid-portion of liquid","none of the above"],correctOption:1,
     answer:"In boiling, bubbles of gas form even at the bottom and rise up. Energy is high enough throughout the liquid.",
     teacherTip:'You can see bubbles forming "throughout" the water.',examTip:'Use "bulk phenomenon" to define boiling.'},

    // ===== SHORT/LONG ANSWER =====
    {id:"sa1",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Define the term matter. What is it composed of?",
     answer:"Anything which occupies space and has mass is called matter. Matter is composed of tiny particles called MOLECULES.",
     teacherTip:'If you can weigh it and it takes up room, it\'s matter.',examTip:'Include both "mass" and "space" for a perfect definition.'},
    {id:"sa2",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"State three properties of molecules of a matter.",
     answer:"1. They are very small in size.\n2. They have spaces between them.\n3. They are in constant motion and they possess kinetic energy.",
     teacherTip:'Remember the 3 S\'s: Small, Spaces, Spinning (motion).',examTip:'Mentioning "kinetic energy" shows you understand the physics.'},
    {id:"sa3",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What do you mean by the inter-molecular spaces? How do they vary in different states of matter?",
     answer:'INTER-MOLECULAR SPACES: "The spacing between the molecules of matter is called Inter-molecular spaces." The inter-molecular spaces is less in solids, more in liquids and still more in gases.\n\nExperiment: Take water in a measuring cylinder up to 80 ml mark. Add 10 gm of salt. Volume remains same at 80 ml because salt molecules occupy the spaces between water molecules.',
     teacherTip:'Think of molecules in a solid like people on a crowded train, and in a gas like people in a park.',examTip:'Use the salt experiment as a perfect example to prove that these spaces exist.'},
    {id:"sa4",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is meant by the inter-molecular forces of attraction? How do they vary in solids, liquids and gases?",
     answer:'INTER-MOLECULAR FORCES OF ATTRACTION: "The forces of attraction between the molecules of matter is called the inter-molecular force of attraction." This inter molecular force is maximum in solids, less in liquids and least in gases.',
     teacherTip:'Think of this force as "molecular magnets" pulling on each other.',examTip:'Use "maximum," "less," and "least" for a clear comparison.'},
    {id:"sa5",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Discuss the three states of matter (solid, liquid, gas) on the basis of molecular model.",
     answer:'SOLIDS: Molecules are very tightly packed with very less intermolecular space and high intermolecular force. They vibrate about their mean position. Definite shape and volume.\n\nLIQUIDS: Molecules are less tightly packed. Lesser force of intermolecular attraction. Greater intermolecular distance than solids. No definite shape but have definite volume at a given temperature.\n\nGASES: Molecules are far apart with greatest intermolecular distance and weakest intermolecular forces. Molecules move about freely. No definite shape or volume.',
     teacherTip:'Draw a simple box with dots for each state.',examTip:'Use terms like "mean position" for solids.'},
    {id:"sa6",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What do you mean by the change of state? Write the flow chart showing the complete cycle.",
     answer:'CHANGE OF STATE: "The process of change from one state to another either by absorption or rejection of heat at a constant temperature."\n\nComplete Cycle:\nSOLID →(Melting)→ LIQUID →(Vaporization)→ GAS\nGAS →(Condensation)→ LIQUID →(Freezing)→ SOLID\nSOLID →(Sublimation)→ GAS\nGAS →(Deposition)→ SOLID',
     teacherTip:'Absorption of heat makes things "looser," rejection makes them "tighter."',examTip:'Practice drawing the cycle with arrows.'},
    {id:"sa7",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Differentiate between melting point and boiling point, giving at least one example of each.",
     answer:'MELTING POINT: The temperature at which a solid starts changing into liquid without further increase in temperature. Example: Ice melts at 0°C into water.\n\nBOILING POINT: The temperature at which a liquid starts changing into vapour without further rise in temperature. Example: Water boils at 100°C.',
     teacherTip:'Melting point = Solid\'s "breaking point"; Boiling point = Liquid\'s "escape point."',examTip:'Always mention that the temperature remains "constant."'},
    {id:"sa8",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Describe the process of condensation and sublimation with examples.",
     answer:'CONDENSATION: The change of vapours on cooling at fixed temperature to liquid. Example: Steam at 100°C condenses to water at 100°C on cooling.\n\nSUBLIMATION: The process of change of solid directly into vapours on heating. Example: Naphthalene balls undergo sublimation when exposed to air. Dry ice converts from solid to gas.',
     teacherTip:'Condensation is "gas to liquid," Sublimation is "solid to gas."',examTip:'Mention "cooling" for condensation and "heating" for sublimation.'},
    {id:"sa9",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is evaporation? State three factors which affect the rate of evaporation.",
     answer:'EVAPORATION: The change of state of a liquid to vapour at all temperatures from the surface of liquid.\n\nFactors affecting rate of evaporation:\n1. Area of exposed surface - more area = faster evaporation\n2. Temperature of liquid - higher temperature = faster evaporation\n3. Nature of the liquid - volatile liquids evaporate faster\n4. Presence of humidity - less humidity = faster evaporation',
     teacherTip:'Think of "Hot, Dry, and Wide" for fast evaporation.',examTip:'Mentioning "Area of exposed surface" is very common for full marks.'},
    {id:"sa10",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Why is cooling produced on evaporation of a liquid?",
     answer:'For evaporation, a liquid requires HEAT. This heat is taken from the surroundings (body, palm, forehead). The temperature of the surroundings falls and we feel cool. The fast-moving (hot) molecules leave the surface, so the average energy of remaining liquid drops.',
     teacherTip:'Evaporation is like a "heat thief" that takes warmth away.',examTip:'Mention that heat is "absorbed from the surroundings."'},
    {id:"sa11",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Wet clothes dry more quickly on a warm dry day than on a cold humid day. Explain.",
     answer:'Rate of evaporation is directly proportional to temperature. On a warm day (higher temperature), rate of evaporation is higher so clothes dry faster. Also, dry air can absorb more moisture, while humid air is already "full" of water vapour.',
     teacherTip:'Warm air acts like a "hungry sponge" for water molecules.',examTip:'Mention "directly proportional to temperature."'},
    {id:"sa12",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Why does the size of naphthalene balls decrease when left open?",
     answer:'When naphthalene balls are left open, due to sublimation they change to vapours directly (without becoming liquid first) and their size decreases. This is why you can smell them even though they are solid.',
     teacherTip:'The smell of mothballs is actually the "lost" solid molecules floating in the air.',examTip:'Use the word "sublimation" as the central reason.'},
    {id:"sa13",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Why are volatile liquids such as alcohol and spirit stored in tightly closed bottles?",
     answer:'Volatile liquids like alcohol and spirit evaporate very easily at room temperature because the intermolecular forces between their molecules are very weak. They are stored in tightly closed bottles to prevent evaporation and loss of the liquid.',
     teacherTip:'"Volatile" means it "wants" to be a gas.',examTip:'Define volatile liquids as those that "evaporate easily at room temperature."'},
    {id:"sa14",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Why in hot summer days water remains cool in earthen pots?",
     answer:'Water seeps out through the pores in the earthen pot and it evaporates. The latent heat required for evaporation is taken from the water inside the pot, which gets cooled. The earthen pot acts like a "sweating" skin for the water inside.',
     teacherTip:'Earthen pots are "living" coolers because of their tiny pores.',examTip:'Mention "pores" and "latent heat" for a complete scientific explanation.'},
    {id:"sa15",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"A patient suffering from high fever is advised to put wet cloth strips on his forehead. Why?",
     answer:'Water in wet strips evaporates, taking latent heat required for evaporation from the forehead. The temperature of the forehead (body) falls and the patient feels relieved. This is a simple way to lower body temperature without medicine.',
     teacherTip:'The wet cloth acts like a "heat magnet" that carries fever away as it dries.',examTip:'Focus on the "transfer of heat" from the body to the evaporating water.'},
    {id:"sa16",topicId:"ch1-matter",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Describe an experiment to demonstrate the process of sublimation.",
     answer:'Take some Ammonium chloride powder in a china dish. Cover the china dish with inverted funnel and put a cotton plug in end of funnel so that vapours do not escape. Heat the dish with burner. Solid ammonium chloride changes into vapours. When these vapours come in contact with the cold walls of the funnel, they get cooled and change back to solid (deposition), getting deposited on the funnel walls.',
     teacherTip:'The "cotton plug" is essential so you don\'t lose vapours.',examTip:'Draw the funnel with the "cotton plug" clearly labeled.'},

    // ============================================================
    // CHAPTER 2: PHYSICAL QUANTITIES AND MEASUREMENT - NOTES
    // ============================================================
    {id:"c2n1",topicId:"ch2-measurement",type:"note",subtopic:"Mass and Volume",
     content:'MASS is the quantity of matter contained in a body. VOLUME is the space occupied by a body.',
     explanation:'Mass tells us how much "stuff" is inside an object and stays the same no matter where the object is. Volume describes the three-dimensional room or capacity that the object takes up.',
     teacherTip:'Think of Mass as the number of bricks in a pile and Volume as the size of the box those bricks fit into.',
     examTip:'For full marks, always define Mass using "quantity of matter" and Volume using "space occupied."'},
    {id:"c2n2",topicId:"ch2-measurement",type:"note",subtopic:"Equal Mass - Different Volume",
     content:'Equal mass of IRON and cotton — iron will have less volume than cotton because iron is denser.',
     explanation:'Because iron is much denser, its particles are packed very tightly, so you only need a small piece to reach a certain mass. Cotton is very loose and airy, so you need a giant pile to weigh the same.',
     teacherTip:'Heavy materials take up less room for the same weight.',
     examTip:'Mention "density" when explaining why volumes differ for equal masses.'},
    {id:"c2n3",topicId:"ch2-measurement",type:"note",subtopic:"Equal Volume - Different Mass",
     content:'Equal volume of Iron and cotton — the mass of iron is more than mass of cotton, because iron is denser than cotton.',
     explanation:'If you have two boxes of the exact same size, the one filled with iron will be much heavier than the one with cotton. Iron has more matter squeezed into the same space.',
     teacherTip:'"Denser" means more crowded particles inside the same size box.',
     examTip:'Use the term "denser" specifically to compare the mass of two equal volumes.'},
    {id:"c2n4",topicId:"ch2-measurement",type:"note",subtopic:"Density - Definition & Formula",
     content:'DENSITY is the ratio of mass of substance to volume of substance. D = M/V. The S.I. unit of density is kg m⁻³.',
     explanation:'Density is a mathematical way to describe how compact a material is by dividing its mass by its volume. It helps scientists identify substances because every pure material has its own unique density.',
     teacherTip:'Use the "Heart" trick: draw an M over a V, like a triangle — M on top, D×V on the bottom.',
     examTip:'Always write the formula D = M/V before solving numerical density problems.'},
    {id:"c2n5",topicId:"ch2-measurement",type:"note",subtopic:"Density Does Not Change with Shape",
     content:'Density of a substance does not change with change in shape or size.',
     explanation:'Whether you have a tiny gold ring or a large gold bar, the density of the gold remains exactly the same. Density is a property of the material itself, not the object\'s specific dimensions.',
     teacherTip:'A drop of water has the same density as a whole bucket of water.',
     examTip:'Remember that cutting an object in half does not change its density.'},
    {id:"c2n6",topicId:"ch2-measurement",type:"note",subtopic:"Effect of Temperature on Density",
     content:'When a substance is heated it expands and volume increases, hence density decreases. Water has maximum density at 4°C — density increases from 0°C to 4°C and decreases above 4°C.',
     explanation:'Heating makes particles move further apart, taking up more space and making the material less dense. Water is unique because it actually gets denser as it warms up to 4°C before expanding like other liquids.',
     teacherTip:'4°C is the "Magic Number" for water\'s highest density.',
     examTip:'Mention "Anomalous expansion" when talking about why water density is highest at 4°C.'},
    {id:"c2n7",topicId:"ch2-measurement",type:"note",subtopic:"Measuring Volume",
     content:'Volume of substance is measured by formula V = L × B × H (for regular shapes) or by measuring cylinder (for irregular shapes and liquids).',
     explanation:'Regularly shaped objects like boxes use multiplication of their sides, while liquids or irregular shapes are measured using a marked container.',
     teacherTip:'For a cylinder, always read the bottom of the curved water line (the meniscus).',
     examTip:'Units for volume must always be cubed, such as cm³ or m³.'},
    {id:"c2n8",topicId:"ch2-measurement",type:"note",subtopic:"Measuring Mass",
     content:'Mass is measured by beam balance or spring balance.',
     explanation:'A beam balance compares an object\'s mass to standard weights to find a match, while a spring balance measures the pull of gravity.',
     teacherTip:'Beam balance measures "Mass," while spring balance technically measures "Weight."',
     examTip:'Name the "Beam Balance" specifically when asked for a tool that measures mass accurately.'},
    {id:"c2n9",topicId:"ch2-measurement",type:"note",subtopic:"Relative Density",
     content:'RELATIVE DENSITY of substance is the density compared with water — how many times the substance is denser than water. Since density of water is 1 g cm⁻³, density of a substance in g cm⁻³ = relative density. S.I. unit of R.D. has no units since it is the ratio of same quantities.',
     explanation:'Relative density is just a number that tells us if something is heavier or lighter than water. Because we divide two identical types of measurements, the units cancel out.',
     teacherTip:'Relative Density is a "Comparison Number" with no units.',
     examTip:'Never write units like g or cm after a relative density value.'},
    {id:"c2n10",topicId:"ch2-measurement",type:"note",subtopic:"Sinking and Floating",
     content:'If a substance has density MORE than liquid it SINKS. If density is LESS than liquid it FLOATS on the liquid.',
     explanation:'Heavy, dense objects like stones overcome the upward push of water and fall to the bottom. Lightweight, less dense objects like wood are pushed up by the water and stay on the surface.',
     teacherTip:'Dense = Sinker, Less Dense = Floater.',
     examTip:'If an object\'s R.D. is greater than 1, it will sink in water.'},
    {id:"c2n11",topicId:"ch2-measurement",type:"note",subtopic:"Buoyant Force",
     content:'BUOYANT FORCE: The force exerted by liquid acting vertically upward on a body, equal to the weight of liquid displaced by its immersed part. Also called Upthrust.',
     explanation:'This is the invisible "upward push" you feel when you try to push a ball under water. The strength depends on how much water the object pushes out of the way.',
     teacherTip:'Buoyant force is the "water\'s helping hand" pushing things up.',
     examTip:'Use the term "Upthrust" as another name for Buoyant Force in your answers.'},
    {id:"c2n12",topicId:"ch2-measurement",type:"note",subtopic:"Weight vs Buoyancy",
     content:'Weight of body acts vertically downward (tendency to sink). Buoyant force acts vertically upward. The body sinks, floats, or stays suspended depending on which force is greater.',
     explanation:'Gravity pulls every object toward the center of the Earth (weight). The liquid pushes back upward (buoyancy). The result depends on which force wins.',
     teacherTip:'Weight pulls "Down," Buoyancy pushes "Up."',
     examTip:'In a diagram, represent weight with an arrow pointing straight down and buoyancy pointing straight up.'},
    {id:"c2n13",topicId:"ch2-measurement",type:"note",subtopic:"Law of Floatation",
     content:'LAW OF FLOATATION: When a body floats in a liquid, the weight of the liquid displaced by its immersed part is equal to the total weight of the body. Apparent weight of floating body is zero.',
     explanation:'When an object is perfectly floating, the water\'s upward push is exactly as strong as the object\'s downward pull. Because these forces balance out, the object feels weightless.',
     teacherTip:'Floating is a "Tie" between weight and buoyancy.',
     examTip:'State that the "Apparent weight" of a floating body is zero.'},
    {id:"c2n14",topicId:"ch2-measurement",type:"note",subtopic:"Density and Sinking/Floating/Suspended",
     content:'Density of body > density of liquid → body SINKS. Density of body = density of liquid → body floats wherever left (neutral buoyancy). Density of body < density of liquid → body RISES and FLOATS on surface.',
     explanation:'These three cases describe every possible outcome when you place an object in a liquid. The density comparison is the key to predicting what will happen.',
     teacherTip:'Think of a submarine staying perfectly still in the middle of the ocean for neutral buoyancy.',
     examTip:'Use "Neutral Buoyancy" to describe the state where an object neither sinks nor rises.'},

     teacherTip:'Material determines density, not the shape.',examTip:'Density is constant for a pure substance at constant temperature.'},
    {id:"c2tf3",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"The density of a liquid decreases with increase in its temperature.",
     correctAnswer:"true",answer:"True. As a liquid gets hotter, its particles move apart and it expands (volume increases). Since mass stays the same but volume increases, density goes down.",
     teacherTip:'Heat expands things, and expansion makes them less dense.',examTip:'Mention that volume increases when temperature increases.'},
    {id:"c2tf4",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"Relative density of water is 1.0.",
     correctAnswer:"true",answer:"True. Relative density is the ratio of a substance\'s density to water\'s density. Water compared to itself is exactly 1.",
     teacherTip:'Water is our standard "ruler" for relative density.',examTip:'Use 1.0 as a reference point for all R.D. problems.'},
    {id:"c2tf5",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"Relative density of a substance is expressed in g cm⁻³.",
     correctAnswer:"false",answer:"False. Relative density has no units. It is a ratio of two identical physical quantities whose units cancel out.",
     teacherTip:'"Relative" means it\'s just a comparison number.',examTip:'Never write units for Relative Density.'},
    {id:"c2tf6",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"When a body is immersed in a liquid, the buoyant force experienced is equal to the volume of the liquid displaced by it.",
     correctAnswer:"false",answer:"False. The buoyant force is equal to the WEIGHT of the liquid displaced, not the volume.",
     teacherTip:'Force = Weight, not Volume.',examTip:'Carefully distinguish between "Volume" and "Weight" when defining Buoyant Force.'},
    {id:"c2tf7",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"A body experiences the same buoyant force while floating in water or alcohol.",
     correctAnswer:"true",answer:"True. When an object floats, the buoyant force must exactly balance the object\'s weight. Since the object\'s weight is the same, the upward push is the same in any liquid.",
     teacherTip:'Floating is a "Perfect Balance" regardless of the liquid.',examTip:'The buoyant force on a floating body always equals its own weight.'},
    {id:"c2tf8",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"A body experiences the same buoyant force when it floats or sinks in water.",
     correctAnswer:"false",answer:"False. When sinking, the water cannot provide enough buoyant force to match the object\'s weight. The upthrust differs between floating and sinking.",
     teacherTip:'Sinking means the water "lost the battle" to push it up.',examTip:'Buoyant force changes based on how much of the object is underwater.'},
    {id:"c2tf9",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"A body floats in a liquid when its weight becomes equal to the weight of the liquid displaced by its submerged part.",
     correctAnswer:"true",answer:"True. This is the Law of Floatation — the downward pull and upward push are perfectly balanced.",
     teacherTip:'This is the Law of Floatation in action.',examTip:'Use this principle to explain why iron ships can float.'},
    {id:"c2tf10",topicId:"ch2-measurement",type:"true_false",subtopic:"Objective Questions",
     question:"A body while floating, sinks deeper in a liquid of low density than in a liquid of high density.",
     correctAnswer:"true",answer:"True. In a low-density liquid, the object must push more liquid aside to get enough upward force. In high-density liquid, the push is stronger so the object doesn\'t go down as far.",
     teacherTip:'It is easier to float in salty sea water than in fresh pool water.',examTip:'Displacement depends on the density of the liquid.'},

    {id:"c2fb7",topicId:"ch2-measurement",type:"fill_blank",subtopic:"Objective Questions",

    {id:"c2mcq1",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"The correct relation is:",
     options:["Density = Mass × Volume","Mass = Density × Volume","Volume = Density × Mass","Density = Mass + Volume"],correctOption:1,
     answer:"Mass = Density × Volume. This is derived from D = M/V. Rearranging gives M = D × V.",
     teacherTip:'Remember the D = M/V triangle to get all relations correct.',examTip:'Double-check that your formula makes logical sense before calculating.'},
    {id:"c2mcq2",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"The relative density of alcohol is 0.8. Its density is:",
     options:["0.8","800 kg m⁻³","800 g cm⁻³","0.8 kg m⁻³"],correctOption:1,
     answer:"R.D. of 0.8 means the substance is 80% as dense as water. Since water is 1000 kg/m³, density = 0.8 × 1000 = 800 kg/m³.",
     teacherTip:'R.D. is just the "Decimal Version" of the big density number.',examTip:'Pay attention to the units; 0.8 is R.D., but the question asks for density.'},
    {id:"c2mcq3",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"A block of wood of density 0.8 g cm⁻³ has a volume of 60 cm³. The mass of block is:",
     options:["60.8 g","75 g","48 g","0.013 g"],correctOption:2,
     answer:"Mass = Density × Volume = 0.8 × 60 = 48 g.",
     teacherTip:'Always check if your units "match" before you multiply.',examTip:'Show the step 0.8 × 60 = 48 to get partial marks.'},
    {id:"c2mcq4",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"The density of aluminium is 2.7 g cm⁻³ and that of brass is 8.4 g cm⁻³. The correct statement is:",
     options:["Equal masses of aluminium and brass have equal volumes","The mass of a certain volume of brass is more than the mass of equal volume of aluminium","The volume of a certain mass of brass is more than the volume of equal mass of aluminium","Equal volumes of aluminium and brass have equal masses"],correctOption:1,
     answer:"Since brass has much higher density, it has more matter packed into the same space. A brass block is much heavier than an identically sized aluminum block.",
     teacherTip:'Dense things are "heavy for their size."',examTip:'Compare "Equal Volume" to "Density" to find the heaviest mass.'},
    {id:"c2mcq5",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"A density bottle has a marking 25 mL on it. It means that:",
     options:["the mass of density bottle is 25 g","the density bottle will store 25 ml of any liquid in it","the density bottle will store 25 ml of water, but more of denser liquid","the density bottle will store 25 ml of water, but more of lighter liquid"],correctOption:1,
     answer:"A density bottle holds a very precise fixed volume regardless of what liquid is inside. The marking tells the internal capacity.",
     teacherTip:'Volume is about "Capacity," which stays the same even if the liquid changes.',examTip:'Don\'t confuse the bottle\'s volume with the liquid\'s mass.'},
    {id:"c2mcq6",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"The correct statement is:",
     options:["Buoyant force equals the volume of liquid displaced","Buoyant force equals the volume of the body","Buoyant force equals the weight of liquid displaced","Buoyant force is always equal to the weight of the body"],correctOption:2,
     answer:"This is Archimedes\' Principle — the buoyant force equals the weight of the liquid displaced by the immersed part.",
     teacherTip:'Buoyancy = Weight of pushed water.',examTip:'Memorize this exact phrase as it is the most common definition of Buoyancy.'},
    {id:"c2mcq7",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"A piece of wood floats on water. The buoyant force on wood will be:",
     options:["zero","more than the weight of the wood piece","equal to the weight of the wood piece","less than the weight of the wood piece"],correctOption:2,
     answer:"When floating, buoyancy exactly matches weight. If buoyancy were higher, the wood would fly up into the air!",
     teacherTip:'Floating is a "Balanced Tug-of-War."',examTip:'Always state that forces are "equal" when an object is floating steadily.'},
    {id:"c2mcq8",topicId:"ch2-measurement",type:"mcq",subtopic:"Objective Questions",
     question:"The weight of a body is more than the buoyant force experienced by it. The body will:",
     options:["sink","float with some part outside the liquid","float just below the surface","float with whole volume above the surface"],correctOption:0,
     answer:"When gravity\'s pull is stronger than the liquid\'s upward push, the object is forced downward and sinks.",
     teacherTip:'Weight wins the "Downwards" battle, so it sinks.',examTip:'Draw an arrow diagram with a longer "Weight" arrow to show sinking.'},

    // ============================================================
    // CHAPTER 2: SHORT/LONG ANSWER QUESTIONS
    // ============================================================
    {id:"c2sa1",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Define the term density of a substance.",
     answer:'Density of a substance is defined as "Mass per Unit Volume."\nDensity (d) = Mass / Volume = M/V\nS.I. unit: kg m⁻³\nC.G.S. unit: g cm⁻³',
     teacherTip:'Think of density as the "heaviness-per-inch" of a material.',examTip:'Include the formula d = M/V whenever you define density.'},
    {id:"c2sa2",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Name the S.I. unit of density. How is it related to g cm⁻³?",
     answer:'S.I. unit of density is kg m⁻³.\nC.G.S. unit is g cm⁻³.\n\nRelationship:\n1 kg m⁻³ = 1000 g / (100 cm)³ = 1000 / 1000000 g cm⁻³ = 10⁻³ g cm⁻³\nThus, 1 g cm⁻³ = 1000 kg m⁻³',
     teacherTip:'To go from small units to big units, multiply by 1000.',examTip:'Remember 1 g/cm³ = 1000 kg/m³ for unit conversion problems.'},
    {id:"c2sa3",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"The density of brass is 8.4 g cm⁻³. What do you mean by this statement?",
     answer:'This means one cubic centimetre volume of brass has a mass of 8.4 g. It describes the exact mass of a standard "cube" of brass that is one centimeter wide on all sides.',
     teacherTip:'Statements like this are just "Unit Mass" descriptions.',examTip:'In your answer, always specify "one cubic unit" and the "mass in grams."'},
    {id:"c2sa4",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Arrange the following substances in order of their increasing density: Iron, Cork, Brass, Water, Mercury.",
     answer:'Cork, Water, Iron, Brass, Mercury.\n\nCork is the lightest (full of air), followed by water (baseline). Mercury is the heaviest (very dense liquid metal).',
     teacherTip:'Use "Floaters" and "Sinkers" to help you rank them.',examTip:'Read carefully whether it asks for "Increasing" or "Decreasing" order.'},
    {id:"c2sa5",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"How does the density of a liquid (or gas) vary with temperature?",
     answer:'Most liquids increase in volume with increase in temperature, so density decreases.\n\nWater shows anomalous behaviour: Water has maximum density at 4°C. When cooled from high temperature, water contracts up to 4°C (density increases) and expands when cooled further below 4°C (density decreases).\n\nDensity of water at 4°C = 1 g cm⁻³ or 1000 kg m⁻³.',
     teacherTip:'Heat = Expansion = Lower Density.',examTip:'Mention that water is "Anomalous" to show you know it behaves differently.'},
    {id:"c2sa6",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"A given quantity of liquid is heated. Which of the following will vary and how? (a) mass (b) volume (c) density",
     answer:'(a) Mass: does not change.\n(b) Volume: increases with rise in temperature.\n(c) Density: decreases.\n\nSince D = M/V, when V increases with constant M, density D must decrease.',
     teacherTip:'Mass is "Matter" — it stays constant unless you spill some!',examTip:'Use the formula D = M/V to explain why density drops when volume rises.'},
    {id:"c2sa7",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Describe an experiment to determine the density of the material of a coin.",
     answer:'Step 1: Measure mass of coin using beam balance. Let M = 50 g.\nStep 2: Take water in measuring cylinder. Note initial volume V₁ = 40 ml.\nStep 3: Immerse coin in water. Note final volume V₂ = 50 ml.\nStep 4: Volume of coin = V₂ - V₁ = 50 - 40 = 10 ml = 10 cm³\nStep 5: Density = M/V = 50/10 = 5 g cm⁻³',
     teacherTip:'The "Rise in Water" = "Volume of the Coin."',examTip:'Draw a simple diagram of the measuring cylinder before and after.'},
    {id:"c2sa8",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Describe an experiment to determine the density of a liquid.",
     answer:'Step 1: Weigh empty beaker: M₁ = 70 g\nStep 2: Fill beaker (half) with milk and weigh: M₂ = 116 g\nStep 3: Mass of milk = M₂ - M₁ = 116 - 70 = 46 g\nStep 4: Transfer milk to measuring cylinder: V = 40 cc\nStep 5: Density = M/V = 46/40 = 1.15 g cm⁻³',
     teacherTip:'Always remember to subtract the empty container\'s weight!',examTip:'Label your masses as M₁ (empty) and M₂ (full) to make calculations clear.'},
    {id:"c2sa9",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is a density bottle? How is it used to find the density of a liquid?",
     answer:'A density bottle is a small glass bottle with a glass stopper at its neck. The stopper has a narrow hole through it. When the bottle is filled with liquid and the stopper is inserted, excess liquid rises through the hole and drains out.\n\nThus the bottle always contains the same fixed volume of liquid each time. Generally the volume is 25 ml or 50 ml.\n\nIt is used by weighing the bottle empty, then full of water, then full of the test liquid — to find density by comparison.',
     teacherTip:'The "Hole" in the stopper is the secret to its accuracy.',examTip:'Mention that the bottle holds a "fixed volume."'},
    {id:"c2sa10",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Define the term relative density of a substance.",
     answer:'RELATIVE DENSITY is the ratio of density of a substance to the density of water at 4°C.\n\nOR: The ratio of mass of the substance to the mass of an equal volume of water at 4°C.\n\nIt has no units since it is a pure ratio.',
     teacherTip:'Relative density is just a "Comparison with Water."',examTip:'Use the phrase "ratio of densities" for a simple and accurate definition.'},
    {id:"c2sa11",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is the unit of relative density?",
     answer:'Relative density has NO UNITS since it is a pure ratio. When we divide density by density, the units cancel out completely, leaving a dimensionless quantity.',
     teacherTip:'R.D. is a "Unit-free" zone.',examTip:'If you write units for Relative Density, you will lose points.'},
    {id:"c2sa12",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Distinguish between density and relative density.",
     answer:'DENSITY:\n(i) Ratio of mass to volume. D = M/V\n(ii) Units are g cm⁻³ or kg m⁻³\n(iii) Density in kg m⁻³ = R.D. × 1000\n\nRELATIVE DENSITY:\n(i) Ratio of density of substance to density of water\n(ii) It is a pure quantity — has no units\n(iii) R.D. = Density in g cm⁻³',
     teacherTip:'Density has "Units," Relative Density has "None."',examTip:'Create a table with these points to clearly show the differences.'},
    {id:"c2sa13",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:'Explain the meaning of the statement "relative density of aluminium is 2.7".',
     answer:'A piece of aluminium of any volume has mass 2.7 times that of an equal volume of water. i.e. Aluminium is 2.7 times heavier than water.',
     teacherTip:'2.7 is the "Heaviness Multiplier" compared to water.',examTip:'Always mention "equal volume of water" when explaining a relative density value.'},
    {id:"c2sa14",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"How does the density of a body and that of a liquid determine whether the body will float or sink?",
     answer:'If density of body < density of liquid → body FLOATS on surface.\nIf density of body > density of liquid → body SINKS in the liquid.',
     teacherTip:'High Density = Sinker, Low Density = Floater.',examTip:'Use a "Greater than" or "Less than" sign to show the density relationship.'},
    {id:"c2sa15",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"A cork piece floats on water surface while an iron nail sinks in it. Explain the reason.",
     answer:'Cork floats because density of cork is LESS than density of water.\nIron nail sinks because density of iron is MORE than density of water.\n\nCork is airy and light for its size. Iron is compact metal with heavy particles.',
     teacherTip:'It\'s all about the "Density Match."',examTip:'Always mention the density of the liquid (water) as the reference point.'},
    {id:"c2sa16",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Which will sink or float on water? (a) body A: 500 kg m⁻³ (b) body B: 2520 kg m⁻³ (c) body C: 1100 kg m⁻³ (d) body D: 0.85 g cm⁻³",
     answer:'(a) Body A: 500 kg m⁻³ = 0.5 g cm⁻³ < 1 → FLOATS\n(b) Body B: 2520 kg m⁻³ = 2.52 g cm⁻³ > 1 → SINKS\n(c) Body C: 1100 kg m⁻³ = 1.1 g cm⁻³ > 1 → SINKS\n(d) Body D: 0.85 g cm⁻³ < 1 → FLOATS',
     teacherTip:'Turn big S.I. numbers into small decimals by dividing by 1000.',examTip:'Show your unit conversion step to prove how you reached the float/sink decision.'},
    {id:"c2sa17",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is the law of floatation?",
     answer:'When a body floats in a liquid, the weight of the liquid displaced by its immersed part is equal to the total weight of the body.\n\nWeight of floating body = Weight of liquid displaced by its immersed part.',
     teacherTip:'Floating is a "Balanced Weight" act.',examTip:'Use the mathematical equality Weight = Displaced Liquid Weight.'},
    {id:"c2sa18",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"For a floating body, how is its weight related to the buoyant force?",
     answer:'When a body floats, the weight of the liquid displaced by its immersed part is EQUAL to the total weight of the body. The upward push (buoyant force) and the downward pull (weight) are exactly equal.',
     teacherTip:'Weight = Buoyant Force for floating.',examTip:'Use the word "equal" to describe the relationship for any floating object.'},
    {id:"c2sa19",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Why does a piece of ice float on water?",
     answer:'Density of ice (0.9 g cm⁻³) is less than density of water (1 g cm⁻³). Hence, ice floats on water.\n\nWhen water freezes, its molecules move slightly apart to form a crystal structure, which takes up more space, making ice lighter for its size.',
     teacherTip:'Ice is just "puffed up" frozen water.',examTip:'Mention the numerical densities (0.9 vs 1.0) to support your explanation.'},
    {id:"c2sa20",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Explain why an iron needle sinks in water, but a ship made of iron floats on water.",
     answer:'Iron needle: Density of iron > density of water, so it sinks. Weight of iron nail > weight of water displaced.\n\nIron ship: The ship is HOLLOW and the empty space contains AIR, which makes the AVERAGE DENSITY of ship LESS than water. Also, the ship is shaped to displace MORE weight of water than its own weight.',
     teacherTip:'Shape and trapped air are the secrets to making iron float!',examTip:'Use the term "Average Density" when explaining why hollow ships float.'},
    {id:"c2sa21",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"It is easier to swim in sea water than in river water. Explain.",
     answer:'Density of sea water is greater than density of river water (because of dissolved salts).\n\nWith a smaller portion of body submerged in sea water, the weight of sea water displaced equals the body weight. In river water, a larger portion must be submerged to displace the same weight.\n\nSo it is easier to float and swim in sea water.',
     teacherTip:'Salt makes water "stronger" at holding you up.',examTip:'Mention that salt increases the density of water to provide more upthrust.'},
    {id:"c2sa22",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Icebergs floating on sea water are dangerous for ships. Explain.",
     answer:'Icebergs are huge masses of ice (density 0.917 g cm⁻³) floating in sea water. About 9/10 of the iceberg is below the water surface and only 1/10 is above.\n\nCaptains may see a small piece above water but a giant dangerous mass hides below their ship.',
     teacherTip:'The "Tip of the Iceberg" is only 10% of the whole thing!',examTip:'Use the fraction 9/10 to describe how much is underwater.'},
    {id:"c2sa23",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"Explain why it is easier to lift a stone under water than in air.",
     answer:'In water, the stone experiences a buoyant force (upthrust) which counterbalances the weight of the stone acting downward. This makes the stone lighter (reduces apparent weight) and thus easier to lift.\n\nIn air, you must support its full weight by yourself.',
     teacherTip:'Water is your "Invisible Assistant" when lifting things.',examTip:'Explain that buoyant force reduces the "apparent weight" of the stone.'},
    {id:"c2sa24",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",
     question:"What is a submarine? How can it be made to dive and come to the surface?",
     answer:'A submarine is a water-tight boat that can travel under water. It has ballast (water) tanks.\n\nTo DIVE: Water is filled into tanks → average density becomes greater than sea water → submarine sinks.\n\nTo RISE: Water is pumped out of tanks → average density becomes less than sea water → submarine rises to surface.',
     teacherTip:'Submarines use water tanks like "weights" to control their depth.',examTip:'Mention "Ballast Tanks" as the name of the tanks.'},
    {id:"c2sa25",topicId:"ch2-measurement",type:"short_answer",subtopic:"Short/Long Answer",

// ============================================================
// STATE
// ============================================================
let appData;
let currentView = 'home'; // home, subjects, topics, content
let selectedClass = null;
let selectedSubject = null;
let selectedTopic = null;
let contentTab = 'notes'; // notes, questions
let questionFilter = 'all'; // all, true_false, fill_blank, mcq, match, short_answer
let userAnswers = {};

// ============================================================
// CROSS-PLATFORM PERSISTENCE
// Mac/Windows (NW.js): data/studyhub_db.json on disk
// iPad / browser / PWA: localStorage (+ bundled JSON seed)
// ============================================================
const DATA_VERSION = 6; // Bump when new default content is added
const STORAGE_KEY = 'studyhub_db';

function isNwDesktop() {
  try {
    return typeof nw !== 'undefined' ||
      (typeof process !== 'undefined' && process.versions && process.versions.nw);
  } catch (e) {
    return false;
  }
}

function _mergeExternal(source) {
  if (!source || !Array.isArray(source)) return;
  const ids = new Set(DEFAULT_DATA.content.map(c => c.id));
  source.forEach(item => {
    if (!ids.has(item.id)) {
      DEFAULT_DATA.content.push(item);
      ids.add(item.id);
    }
  });
}

function _dbPayload(data, version) {
  return {
    _studyhub: true,
    _version: version,
    _savedAt: new Date().toISOString(),
    classes: data.classes,
    subjects: data.subjects,
    topics: data.topics,
    content: data.content,
    deletedContentIds: data.deletedContentIds || []
  };
}

/** IDs created via "Add New" (c-<timestamp>); bundled items use other id patterns. */
function isUserCreatedContentId(id) {
  return /^c-\d+$/.test(id);
}

function _mergeNewById(target, defaults) {
  const ids = new Set(target.map(function (x) { return x.id; }));
  defaults.forEach(function (d) {
    if (!ids.has(d.id)) {
      target.push(JSON.parse(JSON.stringify(d)));
      ids.add(d.id);
    }
  });
}

function _readDbDesktop() {
  try {
    const fs = require('fs');
    const path = require('path');
    const dbFile = path.join(process.cwd(), 'data', 'studyhub_db.json');
    if (fs.existsSync(dbFile)) {
      return JSON.parse(fs.readFileSync(dbFile, 'utf-8'));
    }
  } catch (err) {
    console.warn('[StudyHub] Could not read DB file:', err.message);
  }
  return null;
}

function _readDbBrowserLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (err) {
    console.warn('[StudyHub] Could not read localStorage:', err.message);
  }
  return null;
}

async function _readDbBrowser() {
  const local = _readDbBrowserLocal();
  if (local) return local;
  try {
    const res = await fetch('data/studyhub_db.json', { cache: 'no-cache' });
    if (res.ok) return await res.json();
  } catch (err) {
    console.warn('[StudyHub] Could not load bundled DB:', err.message);
  }
  return null;
}

function _writeDb(data, version) {
  const payload = _dbPayload(data, version);
  const json = JSON.stringify(payload, null, 2);

  if (isNwDesktop()) {
    try {
      const fs = require('fs');
      const path = require('path');
      const dbDir = path.join(process.cwd(), 'data');
      const dbFile = path.join(dbDir, 'studyhub_db.json');
      if (!fs.existsSync(dbDir)) fs.mkdirSync(dbDir, { recursive: true });
      fs.writeFileSync(dbFile, json, 'utf-8');
    } catch (err) {
      console.error('[StudyHub] Could not write DB file:', err.message);
    }
    return;
  }

  try {
    localStorage.setItem(STORAGE_KEY, json);
  } catch (err) {
    console.error('[StudyHub] Could not save to localStorage:', err.message);
    if (typeof showToast === 'function') {
      showToast('error', '❌ Storage full — export a backup and free space.');
    }
  }
}

function _applySavedData(saved) {
  if (!saved || !saved._studyhub) {
    appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    appData.deletedContentIds = [];
    saveData();
    return;
  }

  // Saved data is the source of truth — edits to any item (including built-in) are kept.
  appData = {
    classes: Array.isArray(saved.classes) ? saved.classes.slice() : [],
    subjects: Array.isArray(saved.subjects) ? saved.subjects.slice() : [],
    topics: Array.isArray(saved.topics) ? saved.topics.slice() : [],
    content: Array.isArray(saved.content) ? saved.content.slice() : [],
    deletedContentIds: Array.isArray(saved.deletedContentIds) ? saved.deletedContentIds.slice() : []
  };

  const deleted = new Set(appData.deletedContentIds);
  _mergeNewById(appData.classes, DEFAULT_DATA.classes);
  _mergeNewById(appData.subjects, DEFAULT_DATA.subjects);
  _mergeNewById(appData.topics, DEFAULT_DATA.topics);

  const contentIds = new Set(appData.content.map(function (c) { return c.id; }));
  DEFAULT_DATA.content.forEach(function (item) {
    if (!contentIds.has(item.id) && !deleted.has(item.id)) {
      appData.content.push(JSON.parse(JSON.stringify(item)));
      contentIds.add(item.id);
    }
  });

  if ((saved._version || 0) !== DATA_VERSION) {
    saveData();
  }
}

async function loadData() {
  _mergeExternal(typeof CHAPTERS_3_TO_8 !== 'undefined' ? CHAPTERS_3_TO_8 : null);
  _mergeExternal(typeof BIOLOGY_DATA !== 'undefined' ? BIOLOGY_DATA : null);
  _mergeExternal(typeof CHEMISTRY_DATA !== 'undefined' ? CHEMISTRY_DATA : null);
  _mergeExternal(typeof HISTORY_CIVICS_DATA !== 'undefined' ? HISTORY_CIVICS_DATA : null);

  const saved = isNwDesktop() ? _readDbDesktop() : await _readDbBrowser();
  _applySavedData(saved);
}

function saveData() {
  if (!appData) return false;
  _writeDb(appData, DATA_VERSION);
  return true;
}

function setupPersistenceGuards() {
  window.addEventListener('beforeunload', function () {
    if (appData) saveData();
  });
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden' && appData) saveData();
  });
}

// ============================================================
// NAVIGATION
// ============================================================
function navigateTo(view, id) {
  closeSidebar();
  currentView = view;
  userAnswers = {};
  if (view === 'home') { selectedClass = null; selectedSubject = null; selectedTopic = null; }
  if (view === 'subjects') { selectedClass = id; selectedSubject = null; selectedTopic = null; }
  if (view === 'topics') { selectedSubject = id; selectedTopic = null; }
  if (view === 'content') { selectedTopic = id; contentTab = 'notes'; questionFilter = 'all'; }
  render();
}

function render() {
  renderBreadcrumb();
  renderSidebar();
  renderMain();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span onclick="navigateTo('home')">🏠 Home</span>`;
  if (selectedClass) {
    const cls = appData.classes.find(c=>c.id===selectedClass);
    html += `<span class="sep">›</span><span onclick="navigateTo('subjects','${selectedClass}')">${cls?.name||selectedClass}</span>`;
  }
  if (selectedSubject) {
    const sub = appData.subjects.find(s=>s.id===selectedSubject);
    html += `<span class="sep">›</span><span onclick="navigateTo('topics','${selectedSubject}')">${sub?.icon||''} ${sub?.name||selectedSubject}</span>`;
  }
  if (selectedTopic) {
    const t = appData.topics.find(t=>t.id===selectedTopic);
    html += `<span class="sep">›</span><span class="active">${t?.icon||''} ${t?.name||selectedTopic}</span>`;
  }
  bc.innerHTML = html;
}

function renderSidebar() {
  // Classes
  const classNav = document.getElementById('class-nav');
  classNav.innerHTML = appData.classes.map(c => `
    <div class="nav-item ${selectedClass===c.id?'active':''}" onclick="navigateTo('subjects','${c.id}')">
      <span class="icon">${c.icon}</span> ${c.name}
    </div>
  `).join('');

  // Subjects
  const subSection = document.getElementById('subject-nav-section');
  const subNav = document.getElementById('subject-nav');
  if (selectedClass) {
    subSection.style.display = 'block';
    const subs = appData.subjects.filter(s=>s.classId===selectedClass);
    subNav.innerHTML = subs.map(s => `
      <div class="nav-item ${selectedSubject===s.id?'active':''}" onclick="navigateTo('topics','${s.id}')">
        <span class="icon">${s.icon}</span> ${s.name}
        <span class="badge">${appData.topics.filter(t=>t.subjectId===s.id).length}</span>
      </div>
    `).join('');
  } else { subSection.style.display='none'; }

  // Topics
  const topSection = document.getElementById('topic-nav-section');
  const topNav = document.getElementById('topic-nav');
  if (selectedSubject) {
    topSection.style.display = 'block';
    const tops = appData.topics.filter(t=>t.subjectId===selectedSubject);
    topNav.innerHTML = tops.map(t => `
      <div class="nav-item ${selectedTopic===t.id?'active':''}" onclick="navigateTo('content','${t.id}')">
        <span class="icon">${t.icon}</span> ${t.name}
        <span class="badge">${appData.content.filter(c=>c.topicId===t.id).length}</span>
      </div>
    `).join('');
  } else { topSection.style.display='none'; }
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (currentView === 'home') renderHome(main);
  else if (currentView === 'subjects') renderSubjects(main);
  else if (currentView === 'topics') renderTopics(main);
  else if (currentView === 'content') renderContent(main);
}

    body.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><h3>No notes yet</h3><p>Click "Add New" to create notes</p></div>';
    return;
  }
  body.innerHTML = notes.map((n, i) => `
    <div class="note-block fade-in" style="animation-delay:${i*0.05}s">
      <div class="note-number">${i+1}</div>
      <h3>${escHtml(n.subtopic)}</h3>

function renderQuestions(questions) {
  const body = document.getElementById('content-body');

  const types = [
    {key:'all',label:'All',icon:'📋'},
    {key:'true_false',label:'True/False',icon:'✅'},
    {key:'fill_blank',label:'Fill Blanks',icon:'✍️'},
    {key:'mcq',label:'MCQ',icon:'🔘'},
    {key:'match',label:'Match',icon:'🔗'},
    {key:'short_answer',label:'Short/Long Answer',icon:'📋'}
  ];

  const filtered = questionFilter === 'all' ? questions : questions.filter(q=>q.type===questionFilter);

  let tabsHtml = `<div class="question-type-tabs">${types.map(t =>
    `<div class="q-tab ${questionFilter===t.key?'active':''}" onclick="setQuestionFilter('${t.key}')">${t.icon} ${t.label} (${t.key==='all'?questions.length:questions.filter(q=>q.type===t.key).length})</div>`
  ).join('')}</div>`;

  let qHtml = '';
  if (filtered.length === 0) {
    qHtml = '<div class="empty-state"><div class="empty-icon">❓</div><h3>No questions of this type</h3></div>';
  } else {
    filtered.forEach((q, i) => {
      qHtml += renderSingleQuestion(q, i);
    });
  }

  body.innerHTML = tabsHtml + qHtml;
}

function setQuestionFilter(f) {
  questionFilter = f;
  userAnswers = {};
  const contents = appData.content.filter(c=>c.topicId===selectedTopic);
  renderQuestions(contents.filter(c=>c.type!=='note'));
}

function renderSingleQuestion(q, idx) {
  const answered = userAnswers[q.id];
  let html = `<div class="question-card fade-in" style="animation-delay:${idx*0.04}s">`;
  const typeLabels = {true_false:'TRUE / FALSE',fill_blank:'FILL IN THE BLANK',mcq:'MULTIPLE CHOICE',match:'MATCH THE FOLLOWING',short_answer:'SHORT / LONG ANSWER'};
  html += `<div class="q-label">${typeLabels[q.type]||q.type}</div>`;
  html += `<div class="q-text">Q${idx+1}. ${escHtml(q.question)}</div>`;

  if (q.type === 'true_false') {
    html += `<div class="tf-options">
      <button class="tf-btn ${answered==='true'?(q.correctAnswer==='true'?'selected-true':'selected-false'):''}" onclick="answerTF('${q.id}','true')">✅ True</button>
      <button class="tf-btn ${answered==='false'?(q.correctAnswer==='false'?'selected-true':'selected-false'):''}" onclick="answerTF('${q.id}','false')">❌ False</button>
    </div>`;
  }

  if (q.type === 'mcq' && q.options) {
    html += `<div class="q-options">`;
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, oi) => {
      let cls = '';
      if (answered !== undefined) {
        if (oi === q.correctOption) cls = 'correct';
        else if (answered === oi) cls = 'wrong';
      }
      html += `<div class="q-option ${cls} ${answered===oi&&oi!==q.correctOption?'selected':''}" onclick="answerMCQ('${q.id}',${oi})">
        <span class="opt-letter">${letters[oi]}</span> ${escHtml(opt)}
      </div>`;
    });
    html += `</div>`;
  }

  if (q.type === 'fill_blank') {
    const isCorrect = answered && answered.toLowerCase().trim() === q.blankAnswer.toLowerCase().trim();
    html += `<div style="margin:10px 0">
      <input class="blank-input ${answered?(isCorrect?'correct':'wrong'):''}" placeholder="Type your answer..." value="${answered||''}" oninput="userAnswers['${q.id}']=this.value" id="blank-${q.id}">
      <button class="btn btn-sm btn-primary" style="margin-left:8px" onclick="checkBlank('${q.id}')">Check</button>
    </div>`;
  }

  if (q.type === 'match' && q.pairs) {
    html += `<div class="match-grid"><div><h4>Column A</h4>`;
    q.pairs.forEach((p,pi) => html += `<div class="match-item">${String.fromCharCode(97+pi)}) ${escHtml(p.left)}</div>`);
    html += `</div><div><h4>Column B</h4>`;
    const shuffled = [...q.pairs].sort(()=>Math.random()-0.5);
    shuffled.forEach((p,pi) => html += `<div class="match-item">${String.fromCharCode(105+pi)}) ${escHtml(p.right)}</div>`);
    html += `</div></div>`;
  }

  // Toggle answer
  html += `<div class="toggle-answer" onclick="toggleAnswer('ans-${q.id}')">👁️ Show Answer & Explanation</div>`;
  html += `<div class="answer-reveal ${answered!==undefined?'show':''}" id="ans-${q.id}">
    <p><strong>✅ Answer:</strong> ${escHtml(q.answer||'')}</p>
    ${q.teacherTip?`<div class="tip-box" style="margin-top:8px"><strong>💡 Teacher's Tip:</strong> ${escHtml(q.teacherTip)}</div>`:''}
    ${q.examTip?`<div class="tip-box exam" style="margin-top:6px"><strong>🎯 Exam Tip:</strong> ${escHtml(q.examTip)}</div>`:''}
  </div>`;

  html += `<div style="margin-top:10px;display:flex;gap:6px">
    <button class="btn btn-sm btn-outline" onclick="editContent('${q.id}')">✏️ Edit</button>
    <button class="btn btn-sm btn-danger" onclick="deleteContent('${q.id}')">🗑️</button>
  </div>`;
  html += `</div>`;
  return html;
}

function saveContent(e) {
  e.preventDefault();
  const editId = document.getElementById('f-edit-id').value;
  const classId = document.getElementById('f-class').value;
  const subjectId = document.getElementById('f-subject').value;
  let topicId = document.getElementById('f-topic').value;
  const newTopic = document.getElementById('f-new-topic').value.trim();
  const subtopic = document.getElementById('f-subtopic').value.trim();
  const type = document.getElementById('f-type').value;

  if (!classId || !subjectId) { alert('Please select class and subject'); return; }
  if (!topicId && !newTopic) { alert('Please select or create a topic'); return; }

  // Create new topic if needed
  if (newTopic && !topicId) {
    topicId = 'topic-' + Date.now();
    appData.topics.push({ id: topicId, subjectId, classId, name: newTopic, icon: '📖' });
  }

  let item = { id: editId || ('c-' + Date.now()), topicId, type, subtopic };

  if (type === 'note') {
    item.content = document.getElementById('f-note-content').value;
    item.explanation = document.getElementById('f-note-explanation').value;
    item.teacherTip = document.getElementById('f-teacher-tip').value;
    item.examTip = document.getElementById('f-exam-tip').value;
  } else {
    item.question = document.getElementById('f-q-text').value;
    item.answer = document.getElementById('f-q-answer').value;
    item.teacherTip = document.getElementById('f-q-teacher-tip').value;
    item.examTip = document.getElementById('f-q-exam-tip').value;

    if (type === 'mcq') {
      item.options = [
        document.getElementById('f-opt-a').value,
        document.getElementById('f-opt-b').value,
        document.getElementById('f-opt-c').value,
        document.getElementById('f-opt-d').value
      ];
      item.correctOption = ['a','b','c','d'].indexOf(document.getElementById('f-correct-opt').value.toLowerCase());
    }
    if (type === 'true_false') {
      item.correctAnswer = document.getElementById('f-tf-answer').value;
    }
    if (type === 'fill_blank') {
      item.blankAnswer = document.getElementById('f-blank-answer').value;
    }
    if (type === 'match') {
      const pairsStr = document.getElementById('f-match-pairs').value;
      item.pairs = pairsStr.split(',').map(p => {
        const [l,r] = p.split('=');
        return { left: (l||'').trim(), right: (r||'').trim() };
      }).filter(p=>p.left&&p.right);
    }
  }

  if (editId) {
    const idx = appData.content.findIndex(c=>c.id===editId);
    if (idx>=0) appData.content[idx] = item;
    else appData.content.push(item);
  } else {
    appData.content.push(item);
  }

  if (!saveData()) {
    showToast('error', '❌ Could not save changes. Try Export backup.');
    return;
  }
  showToast('success', editId ? '✅ Changes saved.' : '✅ New item saved.');
  closeModal('modal-add');
  render();
}

function editContent(id) {
  const item = appData.content.find(c=>c.id===id);
  if (!item) return;
  const topic = appData.topics.find(t=>t.id===item.topicId);
  const subject = topic ? appData.subjects.find(s=>s.id===topic.subjectId) : null;

  document.getElementById('f-edit-id').value = id;
  document.getElementById('modal-title').textContent = 'Edit Content';
  populateFormSelects();

  if (subject) {
    document.getElementById('f-class').value = subject.classId;
    onFormClassChange();
    document.getElementById('f-subject').value = subject.id;
    onFormSubjectChange();
  }
  if (topic) document.getElementById('f-topic').value = topic.id;
  document.getElementById('f-subtopic').value = item.subtopic || '';
  document.getElementById('f-type').value = item.type;
  toggleQuestionFields();

  if (item.type === 'note') {
    document.getElementById('f-note-content').value = item.content || '';
    document.getElementById('f-note-explanation').value = item.explanation || '';
    document.getElementById('f-teacher-tip').value = item.teacherTip || '';
    document.getElementById('f-exam-tip').value = item.examTip || '';
  } else {
    document.getElementById('f-q-text').value = item.question || '';
    document.getElementById('f-q-answer').value = item.answer || '';
    document.getElementById('f-q-teacher-tip').value = item.teacherTip || '';
    document.getElementById('f-q-exam-tip').value = item.examTip || '';
    if (item.type === 'mcq' && item.options) {
      document.getElementById('f-opt-a').value = item.options[0]||'';
      document.getElementById('f-opt-b').value = item.options[1]||'';
      document.getElementById('f-opt-c').value = item.options[2]||'';
      document.getElementById('f-opt-d').value = item.options[3]||'';
      document.getElementById('f-correct-opt').value = ['a','b','c','d'][item.correctOption]||'';
    }
    if (item.type === 'true_false') document.getElementById('f-tf-answer').value = item.correctAnswer||'true';
    if (item.type === 'fill_blank') document.getElementById('f-blank-answer').value = item.blankAnswer||'';
    if (item.type === 'match' && item.pairs) {
      document.getElementById('f-match-pairs').value = item.pairs.map(p=>`${p.left}=${p.right}`).join(', ');
    }
  }
  openModal('modal-add');
}

function deleteContent(id) {
  if (!confirm('Are you sure you want to delete this item?')) return;
  appData.content = appData.content.filter(c=>c.id!==id);
  if (!isUserCreatedContentId(id)) {
    if (!appData.deletedContentIds) appData.deletedContentIds = [];
    if (!appData.deletedContentIds.includes(id)) appData.deletedContentIds.push(id);
  }
  if (!saveData()) {
    showToast('error', '❌ Could not save deletion.');
    return;
  }
  showToast('success', '🗑️ Item deleted.');
  render();
}

function searchTopics(query) {
  if (!query.trim()) { render(); return; }
  const q = query.toLowerCase();
  const results = appData.content.filter(c =>
    (c.subtopic||'').toLowerCase().includes(q) ||
    (c.content||'').toLowerCase().includes(q) ||
    (c.question||'').toLowerCase().includes(q) ||
    (c.answer||'').toLowerCase().includes(q)
  );

  const main = document.getElementById('main-content');
  if (results.length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>No results found</h3><p>Try a different search term</p></div>';
    return;
  }

  main.innerHTML = `<div class="section-header"><h1>🔍 Search Results (${results.length})</h1></div>` +
    results.map((item, i) => {
      const topic = appData.topics.find(t=>t.id===item.topicId);
      if (item.type === 'note') {
        return `<div class="note-block fade-in"><h3>${escHtml(item.subtopic)}</h3><p style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">${topic?.name||''}</p><p>${escHtml(item.content||'')}</p></div>`;
      } else {
        return renderSingleQuestion(item, i);
      }
    }).join('');
}

function exportData() {
  const exportObj = {
    _studyhub: true,
    _version: DATA_VERSION,
    _exportedAt: new Date().toISOString(),
    _stats: {
      classes: appData.classes.length,
      subjects: appData.subjects.length,
      topics: appData.topics.length,
      content: appData.content.length
    },
    classes: appData.classes,
    subjects: appData.subjects,
    topics: appData.topics,
    content: appData.content,
    deletedContentIds: appData.deletedContentIds || []
  };
  const json = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `studyhub-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('success', '📥 Backup downloaded! (' + appData.content.length + ' items)');
}

let pendingImport = null;

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = ''; // reset so same file can be re-selected
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      // Validate structure
      if (!data.content || !Array.isArray(data.content)) {
        showToast('error', '❌ Invalid file — missing "content" array.');
        return;
      }
      if (!data.topics || !data.subjects || !data.classes) {
        showToast('error', '❌ Invalid file — missing classes/subjects/topics.');
        return;
      }
      pendingImport = data;
      showImportPreview(file.name, data);
      openModal('modal-import');
    } catch (err) {
      showToast('error', '❌ Could not parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function showImportPreview(filename, data) {
  document.getElementById('import-filename').textContent = '📄 File: ' + filename;
  const cur = appData;
  const imp = data;

  // Count types in imported
  const impTypes = {};
  imp.content.forEach(c => impTypes[c.type] = (impTypes[c.type]||0)+1);
  const curTypes = {};
  cur.content.forEach(c => curTypes[c.type] = (curTypes[c.type]||0)+1);

  document.getElementById('import-preview').innerHTML = `
    <div class="import-col">
      <h4>📊 Current Data</h4>
      <div class="ip-row"><span>Classes</span><span>${cur.classes.length}</span></div>
      <div class="ip-row"><span>Subjects</span><span>${cur.subjects.length}</span></div>
      <div class="ip-row"><span>Topics</span><span>${cur.topics.length}</span></div>
      <div class="ip-row"><span>Total Items</span><span>${cur.content.length}</span></div>
      <div class="ip-row"><span>📝 Notes</span><span>${curTypes.note||0}</span></div>
      <div class="ip-row"><span>❓ Questions</span><span>${cur.content.length-(curTypes.note||0)}</span></div>
    </div>
    <div class="import-col">
      <h4>📦 Imported File</h4>
      <div class="ip-row"><span>Classes</span><span>${imp.classes.length}</span></div>
      <div class="ip-row"><span>Subjects</span><span>${imp.subjects.length}</span></div>
      <div class="ip-row"><span>Topics</span><span>${imp.topics.length}</span></div>
      <div class="ip-row"><span>Total Items</span><span>${imp.content.length}</span></div>
      <div class="ip-row"><span>📝 Notes</span><span>${impTypes.note||0}</span></div>
      <div class="ip-row"><span>❓ Questions</span><span>${imp.content.length-(impTypes.note||0)}</span></div>
    </div>
  `;
}

function confirmImport() {
  if (!pendingImport) return;
  const mode = document.querySelector('input[name="import-mode"]:checked').value;
  const imp = pendingImport;

  if (mode === 'replace') {
    appData.classes = imp.classes;
    appData.subjects = imp.subjects;
    appData.topics = imp.topics;
    appData.content = imp.content;
    appData.deletedContentIds = imp.deletedContentIds || [];
    saveData();
    showToast('success', '🔄 Data replaced! ' + appData.content.length + ' items loaded.');
  } else {
    // Merge mode
    const existingClassIds = new Set(appData.classes.map(c=>c.id));
    imp.classes.forEach(c => { if (!existingClassIds.has(c.id)) appData.classes.push(c); });

    const existingSubIds = new Set(appData.subjects.map(s=>s.id));
    imp.subjects.forEach(s => { if (!existingSubIds.has(s.id)) appData.subjects.push(s); });

    const existingTopicIds = new Set(appData.topics.map(t=>t.id));
    imp.topics.forEach(t => { if (!existingTopicIds.has(t.id)) appData.topics.push(t); });

    const existingContentIds = new Set(appData.content.map(c=>c.id));
    let added = 0;
    imp.content.forEach(c => {
      if (!existingContentIds.has(c.id)) {
        appData.content.push(c);
        existingContentIds.add(c.id);
        added++;
      }
    });
    const del = new Set(appData.deletedContentIds || []);
    (imp.deletedContentIds || []).forEach(function (id) { del.add(id); });
    appData.deletedContentIds = Array.from(del);
    saveData();
    showToast('success', '🔀 Merged! ' + added + ' new items added. Total: ' + appData.content.length);
  }

  pendingImport = null;
  closeModal('modal-import');
  render();
}

// ============================================================
// TOAST
// ============================================================
function showToast(type, message) {
  const t = document.getElementById('toast');
  t.className = 'toast toast-' + type + ' show';
  t.textContent = message;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.remove('show'); }, 3500);
}

// ============================================================
// PWA (iPad / browser offline)
// ============================================================
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol === 'file:') return;
  navigator.serviceWorker.register('sw.js').catch(function (err) {
    console.warn('[StudyHub] Service worker registration failed:', err);
  });
}

// ============================================================
// INIT
// ============================================================
loadData().then(function () {
  render();
  setupPersistenceGuards();
  registerServiceWorker();
});
</script>
